name: dead-file-check

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - refactor-fotochallenge
  pull_request:

jobs:
  dead-file-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run dead file candidate check
        run: ./scripts/find-dead-files.sh
